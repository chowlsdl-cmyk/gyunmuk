<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>균묵이 잡기 🦛</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#fff0f5;min-height:100vh;}
#app{max-width:420px;margin:0 auto;padding:1.2rem;text-align:center;}
#gtitle{font-size:26px;font-weight:700;color:#880e4f;margin-bottom:3px;}
#gsub{font-size:13px;color:#ad5070;margin-bottom:1rem;}
#hud{display:flex;justify-content:space-between;background:#fff;border-radius:14px;padding:10px 16px;margin-bottom:10px;border:1.5px solid #f8bbd0;}
.hud-item{font-size:12px;color:#ad5070;text-align:center;}
.hud-item span{font-size:18px;font-weight:700;color:#880e4f;display:block;}
#prog-label{font-size:12px;color:#ad5070;margin-bottom:5px;}
#prog-wrap{background:#fce4ec;border-radius:99px;height:9px;margin-bottom:12px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,#f48fb1,#e91e63);border-radius:99px;transition:width .3s;}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.hole{background:#fff;border:2px solid #f8bbd0;border-radius:20px;aspect-ratio:1;display:flex;align-items:flex-end;justify-content:center;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.hole::before{content:'';position:absolute;bottom:0;left:0;right:0;height:30%;background:#f48fb1;border-radius:0 0 18px 18px;opacity:.4;}
.mole-wrap{position:absolute;bottom:-130%;width:100%;height:100%;transition:bottom .15s cubic-bezier(.34,1.4,.64,1);display:flex;align-items:flex-end;justify-content:center;z-index:2;}
.mole-wrap.up{bottom:0;}
.mole-wrap img{width:90%;height:90%;object-fit:contain;object-position:bottom;}
.gold-glow{box-shadow:inset 0 0 14px rgba(255,215,0,0.7);border-color:#FFD700 !important;}
.hit-flash{position:absolute;inset:0;background:rgba(255,80,130,.45);border-radius:18px;opacity:0;pointer-events:none;z-index:3;}
@keyframes flash{0%{opacity:1}100%{opacity:0}}
.flashing{animation:flash .25s ease-out forwards;}
.score-pop{position:absolute;top:15%;left:50%;transform:translateX(-50%);font-size:18px;font-weight:700;color:#e91e63;pointer-events:none;z-index:10;animation:popUp .6s ease-out forwards;}
.score-pop.gold{color:#FFB300;font-size:22px;}
@keyframes popUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
#start-btn{background:linear-gradient(135deg,#e91e63,#c2185b);color:#fff;border:none;border-radius:16px;padding:16px 0;font-size:18px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
#clear-screen{display:none;flex-direction:column;align-items:center;padding:2rem 1rem;}
#clear-title{font-size:32px;font-weight:700;color:#880e4f;margin-bottom:4px;}
#clear-sub{font-size:19px;color:#c2185b;margin-bottom:20px;}
#my-img{width:200px;height:200px;object-fit:cover;object-position:center top;border-radius:50%;border:4px solid #f48fb1;margin-bottom:16px;}
#hearts{font-size:34px;margin-bottom:20px;letter-spacing:8px;animation:hb 1s ease-in-out infinite alternate;}
@keyframes hb{0%{transform:scale(1)}100%{transform:scale(1.13)}}
#retry-btn{background:#fff;border:2px solid #f48fb1;border-radius:14px;padding:12px 32px;font-size:15px;color:#880e4f;cursor:pointer;font-weight:600;}
#fail-section{display:none;text-align:center;padding-top:.5rem;}
#fail-msg{font-size:15px;color:#ad5070;margin-bottom:12px;}
#legend{display:flex;gap:12px;justify-content:center;margin-bottom:10px;font-size:12px;color:#ad5070;align-items:center;}
.leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;}
</style>
</head>

const TARGET=20,GAME_TIME=30;
let score=0,timeLeft=GAME_TIME,running=false,gTimer=null,mTimer=null;
let activeMole=null,activeIsGold=false;

function setMole(idx,isGold){
  const wrap=document.getElementById('m'+idx);
  const hole=document.getElementById('h'+idx);
  const src=isGold?GOLD_SRC:NORMALS[Math.floor(Math.random()*NORMALS.length)];
  wrap.innerHTML='<img src="'+src+'">';
  if(isGold)hole.classList.add('gold-glow');
  else hole.classList.remove('gold-glow');
  wrap.classList.add('up');
}
function clearMole(idx){
  document.getElementById('m'+idx).classList.remove('up');
  document.getElementById('h'+idx).classList.remove('gold-glow');
}
function showMole(){
  if(activeMole!==null)clearMole(activeMole);
  const idx=Math.floor(Math.random()*9);
  const isGold=Math.random()<0.2;
  activeMole=idx;activeIsGold=isGold;
  setMole(idx,isGold);
}
function whack(idx){
  if(!running||activeMole!==idx)return;
  const pts=activeIsGold?5:1;
  score+=pts;
  clearMole(idx);
  const fl=document.getElementById('f'+idx);
  fl.classList.remove('flashing');void fl.offsetWidth;fl.classList.add('flashing');
  const pop=document.createElement('div');
  pop.className='score-pop'+(activeIsGold?' gold':'');
  pop.textContent=activeIsGold?'+5 ✨':'+1';
  document.getElementById('h'+idx).appendChild(pop);
  setTimeout(()=>pop.remove(),600);
  activeMole=null;activeIsGold=false;
  document.getElementById('score-d').textContent=score;
  document.getElementById('prog-label').textContent=score+' / '+TARGET+'점';
  document.getElementById('prog-fill').style.width=Math.min(score/TARGET*100,100)+'%';
  if(score>=TARGET){endGame(true);return;}
  clearInterval(mTimer);
  mTimer=setInterval(showMole,Math.max(350,750-score*18));
}
for(let i=0;i<9;i++){
  const h=document.getElementById('h'+i);
  h.addEventListener('click',()=>whack(i));
  h.addEventListener('touchstart',e=>{e.preventDefault();whack(i);},{passive:false});
}
function startGame(){
  score=0;timeLeft=GAME_TIME;running=true;
  document.getElementById('score-d').textContent=0;
  document.getElementById('time-d').textContent=GAME_TIME;
  document.getElementById('prog-label').textContent='0 / '+TARGET+'점';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('start-btn').style.display='none';
  document.getElementById('fail-section').style.display='none';
  document.getElementById('clear-screen').style.display='none';
  document.getElementById('grid').style.display='grid';
  document.getElementById('hud').style.display='flex';
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-label').style.display='block';
  mTimer=setInterval(showMole,750);
  gTimer=setInterval(()=>{timeLeft--;document.getElementById('time-d').textContent=timeLeft;if(timeLeft<=0)endGame(false);},1000);
}
function endGame(win){
  running=false;clearInterval(gTimer);clearInterval(mTimer);
  if(activeMole!==null){clearMole(activeMole);activeMole=null;}
  document.getElementById('grid').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('prog-label').style.display='none';
  if(win){document.getElementById('clear-screen').style.display='flex';}
  else{document.getElementById('fail-section').style.display='block';document.getElementById('fail-msg').textContent=score+'점! 아깝다... 다시 해봐요 🦛';}
}
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('start-btn2').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',()=>{
  document.getElementById('clear-screen').style.display='none';
  document.getElementById('start-btn').style.display='block';
  document.getElementById('hud').style.display='flex';
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-label').style.display='block';
  document.getElementById('grid').style.display='grid';
  document.getElementById('score-d').textContent=0;
  document.getElementById('time-d').textContent=GAME_TIME;
  document.getElementById('prog-label').textContent='0 / '+TARGET+'점';
  document.getElementById('prog-fill').style.width='0%';
});
</script>
