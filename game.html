<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>균묵이 두더지 잡기 🐾</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#fff0f5;min-height:100vh;overflow-x:hidden;}
#app{max-width:420px;margin:0 auto;padding:1.2rem;text-align:center;}
#gtitle{font-size:24px;font-weight:700;color:#880e4f;margin-bottom:3px;}
#gsub{font-size:13px;color:#ad5070;margin-bottom:1rem;}
#hud{display:flex;justify-content:space-between;background:#fff;border-radius:14px;padding:10px 16px;margin-bottom:10px;border:1.5px solid #f8bbd0;box-shadow:0 2px 8px #f8bbd033;}
.hud-item{font-size:12px;color:#ad5070;}
.hud-item span{font-size:18px;font-weight:700;color:#880e4f;display:block;}
#prog-label{font-size:12px;color:#ad5070;margin-bottom:5px;}
#prog-wrap{background:#fce4ec;border-radius:99px;height:9px;margin-bottom:12px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,#f48fb1,#e91e63);border-radius:99px;transition:width .35s;}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.hole{background:#fff;border:2px solid #f8bbd0;border-radius:22px;aspect-ratio:1;display:flex;align-items:flex-end;justify-content:center;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;box-shadow:0 3px 10px #f8bbd044;}
.hole::before{content:'';position:absolute;bottom:0;left:0;right:0;height:38%;background:#f48fb1;border-radius:0 0 20px 20px;opacity:.6;}
.mole-wrap{position:absolute;bottom:-120%;width:88%;transition:bottom .2s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;z-index:2;}
.mole-wrap.up{bottom:0;}
.hit-flash{position:absolute;inset:0;background:rgba(255,80,130,.4);border-radius:20px;opacity:0;pointer-events:none;z-index:3;}
@keyframes flash{0%{opacity:1}100%{opacity:0}}
.flashing{animation:flash .3s ease-out forwards;}
#start-btn{background:linear-gradient(135deg,#e91e63,#c2185b);color:#fff;border:none;border-radius:16px;padding:16px 0;font-size:18px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;box-shadow:0 4px 14px #e91e6355;letter-spacing:.5px;}
#clear-screen{display:none;flex-direction:column;align-items:center;padding:2.5rem 1rem;}
#clear-title{font-size:30px;font-weight:700;color:#880e4f;margin-bottom:4px;}
#clear-sub{font-size:18px;color:#c2185b;margin-bottom:22px;}
#my-circle{width:120px;height:120px;border-radius:50%;object-fit:cover;object-position:center top;border:4px solid #f48fb1;margin-bottom:16px;box-shadow:0 4px 16px #f48fb155;}
#hearts{font-size:32px;margin-bottom:22px;letter-spacing:8px;animation:heartbeat 1s ease-in-out infinite alternate;}
@keyframes heartbeat{0%{transform:scale(1)}100%{transform:scale(1.12)}}
#retry-btn{background:#fff;border:2px solid #f48fb1;border-radius:14px;padding:12px 32px;font-size:15px;color:#880e4f;cursor:pointer;font-weight:600;}
#fail-section{display:none;text-align:center;padding-top:.5rem;}
#fail-msg{font-size:15px;color:#ad5070;margin-bottom:12px;}
</style>
</head>
<body>
<div id="app">
  <div id="gtitle">🐾 균묵이 두더지 잡기</div>
  <div id="gsub">두더지를 빠르게 탭하세요!</div>

  <div id="hud">
    <div class="hud-item"><span id="score-d">0</span>점수</div>
    <div class="hud-item"><span id="time-d">30</span>초 남음</div>
    <div class="hud-item"><span id="target-d">15</span>목표</div>
  </div>
  <div id="prog-label">0 / 15 마리 잡음</div>
  <div id="prog-wrap"><div id="prog-fill" style="width:0%"></div></div>

  <div id="grid">
    <div class="hole" id="h0"><div class="mole-wrap" id="m0"></div><div class="hit-flash" id="f0"></div></div>
    <div class="hole" id="h1"><div class="mole-wrap" id="m1"></div><div class="hit-flash" id="f1"></div></div>
    <div class="hole" id="h2"><div class="mole-wrap" id="m2"></div><div class="hit-flash" id="f2"></div></div>

    <div class="hole" id="h5"><div class="mole-wrap" id="m5"></div><div class="hit-flash" id="f5"></div></div>
    <div class="hole" id="h6"><div class="mole-wrap" id="m6"></div><div class="hit-flash" id="f6"></div></div>
    <div class="hole" id="h7"><div class="mole-wrap" id="m7"></div><div class="hit-flash" id="f7"></div></div>
    <div class="hole" id="h8"><div class="mole-wrap" id="m8"></div><div class="hit-flash" id="f8"></div></div>
  </div>

  <button id="start-btn">게임 시작! 🐾</button>

    <div id="fail-msg"></div>

  </div>

const TARGET=15, GAME_TIME=30;
let score=0,timeLeft=GAME_TIME,running=false,gTimer=null,mTimer=null,activeMole=null;

function moleSVG(){
  return `<svg viewBox="0 0 100 95" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
    <defs><clipPath id="fc"><circle cx="50" cy="33" r="27"/></clipPath></defs>
    <ellipse cx="50" cy="83" rx="36" ry="12" fill="#c2185b" opacity=".2"/>
    <path d="M16 62 Q16 46 50 46 Q84 46 84 62 L84 82 Q84 90 50 90 Q16 90 16 82Z" fill="#ad1457"/>
    <ellipse cx="50" cy="62" rx="34" ry="20" fill="#e91e63"/>
    <circle cx="50" cy="46" r="30" fill="#f06292"/>
    <image href="${BF_SRC}" x="23" y="6" width="54" height="54" clip-path="url(#fc)" preserveAspectRatio="xMidYMid slice"/>
    <circle cx="50" cy="33" r="27" fill="none" stroke="#f8bbd0" stroke-width="2.5"/>
    <ellipse cx="33" cy="58" rx="7" ry="5" fill="#fce4ec" opacity=".8"/>
    <ellipse cx="67" cy="58" rx="7" ry="5" fill="#fce4ec" opacity=".8"/>
  </svg>`;
}

function renderMoles(){
  for(let i=0;i<9;i++) document.getElementById('m'+i).innerHTML=moleSVG();
}
renderMoles();

function showMole(){
  if(activeMole!==null) document.getElementById('m'+activeMole).classList.remove('up');
  let idx; do { idx=Math.floor(Math.random()*9); } while(idx===activeMole);
  activeMole=idx;
  document.getElementById('m'+idx).classList.add('up');
}

function whack(idx){
  if(!running||activeMole!==idx)return;
  score++;
  document.getElementById('m'+idx).classList.remove('up');
  const fl=document.getElementById('f'+idx);
  fl.classList.remove('flashing');void fl.offsetWidth;fl.classList.add('flashing');
  activeMole=null;
  document.getElementById('score-d').textContent=score;
  document.getElementById('prog-label').textContent=score+' / '+TARGET+' 마리 잡음';
  document.getElementById('prog-fill').style.width=Math.min(score/TARGET*100,100)+'%';
  if(score>=TARGET){endGame(true);return;}
  clearInterval(mTimer);
  const spd=Math.max(550,900-score*22);
  mTimer=setInterval(showMole,spd);
}

for(let i=0;i<9;i++){
  const h=document.getElementById('h'+i);
  h.addEventListener('click',()=>whack(i));
  h.addEventListener('touchstart',e=>{e.preventDefault();whack(i);},{passive:false});
}

function startGame(){
  score=0;timeLeft=GAME_TIME;running=true;
  document.getElementById('score-d').textContent=0;
  document.getElementById('time-d').textContent=GAME_TIME;
  document.getElementById('prog-label').textContent='0 / '+TARGET+' 마리 잡음';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('start-btn').style.display='none';
  document.getElementById('fail-section').style.display='none';
  document.getElementById('clear-screen').style.display='none';
  document.getElementById('grid').style.display='grid';
  document.getElementById('hud').style.display='flex';
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-label').style.display='block';
  mTimer=setInterval(showMole,900);
  gTimer=setInterval(()=>{
    timeLeft--;
    document.getElementById('time-d').textContent=timeLeft;
    if(timeLeft<=0)endGame(false);
  },1000);
}

function endGame(win){
  running=false;
  clearInterval(gTimer);clearInterval(mTimer);
  if(activeMole!==null){document.getElementById('m'+activeMole).classList.remove('up');activeMole=null;}
  document.getElementById('grid').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('prog-label').style.display='none';
  if(win){
    document.getElementById('clear-screen').style.display='flex';
  } else {
    document.getElementById('fail-section').style.display='block';
    document.getElementById('fail-msg').textContent=score+'마리 잡았어요! 조금만 더 빠르게! 🐾';
  }
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('start-btn2').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',()=>{
  document.getElementById('clear-screen').style.display='none';
  document.getElementById('start-btn').style.display='block';
  document.getElementById('hud').style.display='flex';
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-label').style.display='block';
  document.getElementById('score-d').textContent=0;
  document.getElementById('time-d').textContent=GAME_TIME;
  document.getElementById('prog-label').textContent='0 / '+TARGET+' 마리 잡음';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('grid').style.display='grid';
});
</script>
</body>
</html>
